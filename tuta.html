<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>URL Existence Checker</title>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f0f2f5;
        margin: 0;
        font-family: sans-serif;
      }
      .card {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        width: 400px;
      }
      h2 {
        margin-top: 0;
        color: #333;
        text-align: center;
      }
      input {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        border: 2px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box;
        outline: none;
        transition: border-color 0.2s;
      }
      input.checking {
        border-color: #007bff;
      }
      input.valid {
        border-color: #28a745;
      }
      input.invalid {
        border-color: #dc3545;
      }
      .status {
        margin-top: 15px;
        font-size: 14px;
        font-weight: 500;
        min-height: 1.2em;
      }
      .loading {
        color: #007bff;
      }
      .success {
        color: #28a745;
      }
      .error {
        color: #dc3545;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>URL Checker</h2>
      <input
        id="urlInput"
        placeholder="Enter URL (e.g., google.com/)"
        autocomplete="off"
      />
      <div
        id="status"
        class="status"
        aria-live="polite"
        aria-atomic="true"
      ></div>
    </div>

    <script>
      const input = document.getElementById("urlInput");
      const statusDiv = document.getElementById("status");
      // Format Validation
      function getUrl(value) {
        let properValue = value.trim();
        if (!properValue) return null;
        //Adding https:// if not present
        if (!/^https?:\/\//i.test(properValue)) {
          properValue = "https://" + properValue;
        }
        try {
          return new URL(properValue);
        } catch (e) {
          return null;
        }
      }

      // Mock Database
      const MockDatabase = {
        "https://tuta.com/": "folder",
        "https://data.com/ParthShetaResume.pdf": "file",
        "https://data.com/ArbeitZeugnis.pdf": "file",
        "https://www.dw.com/": "folder",
        "https://google.com/": "folder",
        "https://example.com/file.txt": "file",
        "https://github.com/": "folder",
      };

      //  Mocking a Server response
      function MockCheckUrl(url) {
        return new Promise((resolve) => {
          const latency = 400 + Math.random() * 400;
          setTimeout(() => {
            if (MockDatabase[url]) {
              resolve({ exists: true, type: MockDatabase[url] });
            } else {
              resolve({ exists: false });
            }
          }, latency);
        });
      }

      // NOTE: Using debounce instead of throttle for better UX.
      // Debounce reduces unnecessary server calls while typing.
      // Can be switched to throttle if strict requirement.
      function debounce(fn, delay) {
        let timer;
        return function (...args) {
          clearTimeout(timer);
          timer = setTimeout(() => fn.apply(this, args), delay);
        };
      }

      // Checking the URL
      // Gen counter to replace AbortController
      let currentGen = 0;
      const performCheck = async (urlObj) => {
        const gen = ++currentGen;
        try {
          const result = await MockCheckUrl(urlObj.href);

          // Discard if a newer request has been made
          if (gen !== currentGen) return;
          if (result.exists) {
            updateUI(`Exists (${result.type})`, "success");
          } else {
            updateUI("Resource not found", "error");
          }
        } catch {
          if (gen !== currentGen) return;
          updateUI("⚠️ Network Error", "error");
        }
      };

      //  UI Helper
      function updateUI(message, type) {
        statusDiv.textContent = message;
        statusDiv.className = `status ${type}`;

        input.classList.remove("checking", "valid", "invalid");
        if (type === "loading") input.classList.add("checking");
        if (type === "success") input.classList.add("valid");
        if (type === "error") input.classList.add("invalid");
      }

      // Execution
      const debouncedCheck = debounce(performCheck, 500);
      input.addEventListener("input", (e) => {
        const raw = e.target.value;
        // Runs immediately on every keystroke
        const urlObj = getUrl(raw);
        if (!raw.trim()) {
          currentGen++;
          updateUI("", "");
          return;
        }
        if (!urlObj) {
          currentGen++;
          updateUI("Invalid URL format", "error");
          return;
        }

        updateUI("Checking server...", "loading");
        // Only the server call is debounced
        debouncedCheck(urlObj);
      });
    </script>
  </body>
</html>
